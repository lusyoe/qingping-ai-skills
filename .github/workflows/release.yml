name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create zip package
        run: |
          zip -r qingping-ai-skills-${{ steps.version.outputs.VERSION }}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".open-mem/*" \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x ".DS_Store"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: qingping-ai-skills-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
